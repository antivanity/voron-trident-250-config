[output_pin beeper]
pin: PG14              # Replace with your chosen pin!
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.0005    # 2kHz tone, good for passive buzzers

[gcode_macro BEEP]
gcode:
    # Parameters
    {% set i = params.I|default(1)|int %}           ; Iterations (number of times to beep).
    {% set dur = params.DUR|default(100)|int %}     ; Duration/wait of each beep in ms. Default 100ms.
    {% set freq = params.FREQ|default(2000)|int %}  ; Frequency in Hz. Default 2kHz.

    {% for iteration in range(i|int) %}
        SET_PIN PIN=beeper VALUE=0.8 CYCLE_TIME={ 1.0/freq if freq > 0 else 1 }
        G4 P{dur}
        SET_PIN PIN=beeper VALUE=0
        G4 P{dur}
    {% endfor %}

; Soft double beep - good for non-urgent info (e.g. print complete)
[gcode_macro ALERT_INFO]
gcode:
    BEEP I=2 DUR=100 FREQ=500

; Triple mid-tone beep - good for warnings (e.g. filament runout)
[gcode_macro ALERT_WARNING]
gcode:
    BEEP I=10 DUR=200 FREQ=12000







; ─── Shared loop state ────────────────────────────────────────────────────────

[gcode_macro _BEEP_LOOP_STATE]
variable_active: 0
variable_mode: 'beep'
variable_i: 1
variable_dur: 100
variable_freq: 2000
gcode:

; ─── Loop runner (called by delayed_gcode) ────────────────────────────────────

[delayed_gcode _BEEP_LOOP_RUNNER]
gcode:
    {% set s = printer["gcode_macro _BEEP_LOOP_STATE"] %}
    {% if s.active %}
        {% if s.mode == 'info' %}
            ALERT_INFO
            UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=1.0
        {% elif s.mode == 'warning' %}
            ALERT_WARNING
            UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=5.0
        {% else %}
            BEEP I={s.i} DUR={s.dur} FREQ={s.freq}
            UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=0.5
        {% endif %}
    {% endif %}

; ─── Loop macros ──────────────────────────────────────────────────────────────

; Loops BEEP with the same I/DUR/FREQ params as the base BEEP macro
[gcode_macro BEEP_LOOP]
gcode:
    {% set i    = params.I|default(1)|int %}
    {% set dur  = params.DUR|default(100)|int %}
    {% set freq = params.FREQ|default(2000)|int %}
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=mode   VALUE='"beep"'
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=i      VALUE={i}
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=dur    VALUE={dur}
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=freq   VALUE={freq}
    UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=0.01

; Loops the ALERT_INFO pattern
[gcode_macro ALERT_LOOP_INFO]
gcode:
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=mode   VALUE='"info"'
    UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=0.01

; Loops the ALERT_WARNING pattern
[gcode_macro ALERT_LOOP_WARNING]
gcode:
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=mode   VALUE='"warning"'
    UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=0.01

; Stops any active loop and silences the buzzer immediately
[gcode_macro BEEP_LOOP_STOP]
gcode:
    SET_GCODE_VARIABLE MACRO=_BEEP_LOOP_STATE VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_BEEP_LOOP_RUNNER DURATION=0
    SET_PIN PIN=beeper VALUE=0